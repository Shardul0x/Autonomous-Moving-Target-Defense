version: '3.8'

networks:
  mtd_network:
    driver: bridge

services:
  webapp:
    build: ./webapp
    container_name: mtd_webapp
    networks:
      - mtd_network
    ports:
      - "8081:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 5s
      timeout: 3s
      retries: 5

  honeypot:
    build: ./honeypot
    container_name: mtd_honeypot
    networks:
      - mtd_network
    ports:
      - "8082:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build: ./gateway
    container_name: mtd_gateway
    networks:
      - mtd_network
    ports:
      - "8080:80"
    depends_on:
      webapp:
        condition: service_healthy
      honeypot:
        condition: service_healthy
    restart: unless-stopped